            <div class="sidebearDB-Right">

                <div class="grafico">

</body>

<script>
    // Seleciona todos os dias e os elementos do gráfico
    const dias = document.querySelectorAll('.dia');
    const grafico = document.getElementById('graficoDashboard');
    const textoStatus = document.getElementById('texto-status');

    dias.forEach(dia => {
        dia.addEventListener('click', () => {
            // 1. Remove o destaque do dia anterior e adiciona no dia clicado
            dias.forEach(d => d.classList.remove('selecionado'));
            dia.classList.add('selecionado');

            // 2. Pega o status do dia clicado (completo ou incompleto)
            const status = dia.getAttribute('data-status');

            // 3. Atualiza o gráfico com base no status
            if (status === 'completo') {
                grafico.className = 'grafico-circular completo';
                textoStatus.innerText = '100%';
                textoStatus.style.color = '#28a745';
            } else {
                grafico.className = 'grafico-circular incompleto';
                textoStatus.innerText = '50%';
                textoStatus.style.color = '#dc3545';
            }
        });
    });
</script>
